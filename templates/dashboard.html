
<!DOCTYPE html>
<html>
<head>
    <title>Agriculture Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            align-items: center;
            background:url("/static/photo5.jpg") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
        }

        .container {
            position: relative;
            z-index: 1;
            width: 520px;
            padding: 30px;
            border-radius: 15px;

            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            color: white;

            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255,255,255,0.15);
            padding: 18px;
            margin: 12px 0;
            border-radius: 12px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.25);
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 6px;
        }

        .card p {
            font-size: 13px;
            opacity: 0.9;
        }

        /* BUTTONS */
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: linear-gradient(45deg, #16a34a, #22c55e);
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.08);
        }

        /* TOP NAV */
        .nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .nav a {
            padding: 8px 15px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            font-size: 13px;
            background: rgba(255,255,255,0.15);
            transition: 0.3s;
        }

        .nav a:hover {
            background: rgba(255,255,255,0.3);
        }

    </style>

</head>

<body>

<div class="container">

    <!-- NAVBAR -->
    <div class="nav">
        <a href="/dashboard">🏠 Home</a>
        <a href="/predict-page">🌱 Predict</a>
        <a href="/logout">🚪 Logout</a>
    </div>

    <h1>🌾 Agriculture Dashboard</h1>

    <div class="card">
        <h2>🌱 Soil Detection System</h2>
        <p>Detect soil type using deep learning CNN model</p>
    </div>

    <div class="card">
        <h2>🌾 Crop Recommendation</h2>
        <p>Get best crop suggestions based on soil type</p>
    </div>

    <div class="card">
        <h2>📊 Smart Agriculture System</h2>
        <p>Soil  decision system for farmers in India</p>
    </div>

    <a href="/predict-page" class="btn">🚀 Start Prediction</a>

</div>

</body>
</html>
