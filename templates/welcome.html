
<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>

    <!-- AUTO REDIRECT AFTER 6 SECONDS -->
    <meta http-equiv="refresh" content="6;url=/dashboard">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            width:100%;
            height:100vh;

            overflow:hidden;

            position:relative;

            background:black;
        }

        /* FULL SCREEN IMAGE */
        .bg-image{

            position:absolute;

            width:100%;
            height:100%;

            top:0;
            left:0;

            object-fit:cover;

            /* VERY SLIGHT ZOOM */
            animation:slowZoom 6s linear forwards;
        }

        /* DARK OVERLAY */
        .overlay{

            position:absolute;

            width:100%;
            height:100%;

            background:rgba(0,0,0,0.28);

            top:0;
            left:0;
        }

        /* TEXT */
        .content{

            position:absolute;

            top:50%;
            left:50%;

            transform:translate(-50%, -50%);

            z-index:2;

            text-align:center;

            color:white;

            animation:fadeIn 2s ease;
        }

        .content h1{

            font-size:64px;

            margin-bottom:15px;

            text-shadow:0 5px 20px rgba(0,0,0,0.6);
        }

        .content p{

            font-size:24px;

            opacity:0.95;

            text-shadow:0 3px 10px rgba(0,0,0,0.6);
        }

        /* FADE ANIMATION */
        @keyframes fadeIn{

            from{
                opacity:0;
                transform:
                translate(-50%, -40%);
            }

            to{
                opacity:1;
                transform:
                translate(-50%, -50%);
            }
        }

        /* SLIGHT ZOOM ONLY */
        @keyframes slowZoom{

            from{
                transform:scale(1);
            }

            to{
                transform:scale(1.03);
            }
        }

    </style>

</head>

<body>

<!-- FULL SCREEN IMAGE -->
<img
    class="bg-image"
    src="{{ url_for('static', filename='myphoto.jpg') }}"
>

<!-- DARK OVERLAY -->
<div class="overlay"></div>

<!-- CONTENT -->
<div class="content">

    <h1>🌱 Welcome</h1>

    <p>Loading Smart Agriculture Dashboard...</p>

</div>

</body>
</html>
